<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tutorial · Vault Access</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0b0b0b;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .glass-card {
            background: rgba(15, 15, 15, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 48px;
            padding: 48px;
            max-width: 680px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
        }
        h1 {
            font-weight: 300;
            font-size: 2.5rem;
            margin-bottom: 16px;
            color: white;
            letter-spacing: 1px;
        }
        .subtitle {
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 40px;
            font-size: 1rem;
            line-height: 1.6;
            max-width: 450px;
            margin-left: auto;
            margin-right: auto;
        }
        .drive-link {
            display: inline-block;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            padding: 20px 32px;
            margin-bottom: 30px;
            word-break: break-all;
            transition: all 0.2s;
        }
        .drive-link a {
            color: #7aa2ff;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 400;
        }
        .drive-link:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }
        .instruction {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .instruction code {
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 8px;
            border-radius: 30px;
            color: #ffb366;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>✦ tutorial</h1>
        <div class="subtitle">download the complete game pack · setup instructions</div>

        <div class="drive-link">
            <a href="https://drive.google.com/drive/folders/1c750lq8RBDmLXTZEUgA0TYGZsdMd7Zne?usp=drive_link" target="_blank" rel="noopener noreferrer">
                📁 open google drive folder
            </a>
        </div>

        <div class="instruction">
            click the link above to access the files.<br>
            if prompted, sign in with your google account.<br>
            <span style="display: inline-block; margin-top: 15px;">!THE TUTORIAL VIDEO IS INSIDE THE GOOGLE DRIVE FOLDER!</span>
        </div>
    </div>
</body>
</html>
