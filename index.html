<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tutorial · the vault</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: #0f0f0f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .glass-card {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 48px;
            padding: 48px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 400;
            margin-bottom: 16px;
            color: white;
            letter-spacing: 1px;
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 40px;
            font-size: 1rem;
            line-height: 1.6;
        }

        .drive-link {
            display: block;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.3);
            border-radius: 60px;
            padding: 20px 32px;
            margin-bottom: 40px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .drive-link:hover {
            background: rgba(124, 58, 237, 0.2);
            border-color: rgba(124, 58, 237, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(124, 58, 237, 0.2);
        }

        .drive-link a {
            color: #b794f4;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: 500;
            word-break: break-all;
        }

        .video-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
        }

        video {
            width: 100%;
            display: block;
        }

        .help-note {
            text-align: center;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
            padding: 20px 0 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .help-note a {
            color: #7c3aed;
            text-decoration: none;
            font-weight: 500;
        }

        .help-note a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h1>✦ tutorial</h1>
        <div class="subtitle">watch the guide · download the files</div>

        <!-- DRIVE LINK (placeholder – change this) -->
        <div class="drive-link">
            <a href="https://google.drive.placeholder/placeholder/change-me" target="_blank" rel="noopener noreferrer">
                📁 open google drive folder
            </a>
        </div>

        <!-- VIDEO PLAYER -->
        <div class="video-container">
            <video controls preload="metadata">
                <source src="tutorialnew.mp4" type="video/mp4">
                your browser does not support the video tag.
                <a href="tutorialnew.mp4">download video</a>
            </video>
        </div>

        <!-- HELP NOTE (as you requested) -->
        <div class="help-note">
            if you need help, ask <a href="#">Niam</a>
        </div>
    </div>
</body>
</html>
